# copier.yml — bailiff-mod-gitlab-repo
#
# Manages GitLab forge metadata for the project: CODEOWNERS, issue templates,
# and MR template under .gitlab/. Optionally creates the GitLab remote when
# create_remote=true (init-only, non-fatal side effect).
#
# Managed files reconcile on reproduce; the glab-creation tasks are INIT-ONLY
# and gated on create_remote=true — non-fatal on failure.
# Public repos keep a HARD exit-1 gate: the user must have set visibility=public
# intentionally (no silent public creation).
#
# Token source: ambient GITLAB_TOKEN (read by glab itself).
# No secret: questions — Constitution VI / FR-005.

# --- Cross-module facts via _external_data (FR-004 / R12) --------------------
_external_data:
  base: .copier-answers.bailiff-mod-base.yml

# project_name and org are read from base via _external_data; they are NOT
# re-asked (when:false) — they exist so templates can use the values.
project_name:
  type: str
  default: "{{ _external_data.base.project_name }}"
  when: false

org:
  type: str
  default: "{{ _external_data.base.org }}"
  when: false

# --- Questions ----------------------------------------------------------------

# Whether to create the remote repository via glab (init-only).
# false = adopt-existing-repo path: .gitlab/ files still render.
create_remote:
  type: bool
  default: false
  help: "Run 'glab repo create' to create the GitLab remote (init-only). false = render .gitlab/ only."

# Repository visibility. public keeps the HARD exit-1 abort gate.
visibility:
  type: str
  choices:
    - private
    - public
    - internal
  default: private
  help: "GitLab repository visibility. public triggers a hard consent gate — set intentionally."

# Whether to use HTTPS or SSH for the remote URL.
remote_protocol:
  type: str
  choices:
    - https
    - ssh
  default: https
  help: "Remote URL protocol (https or ssh)."

# Push the local branch after repo creation.
push_after_create:
  type: bool
  default: false
  help: "Push the current branch to origin after repo creation?"

# Optional group namespace to create the project under (empty = personal namespace).
team:
  type: str
  default: ""
  help: "GitLab group path to create the project under (leave empty for your personal namespace)."

# Module phase: normal (FR-020/R8). base=pre; family=normal.
_bailiff_phase: normal

# --- Dependency edges (FR-019 / R7 — single depends_on, no run_after/run_before) ---
depends_on:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

# Template subtree holds managed .gitlab/ files and the answers-file marker.
_subdirectory: template

# --- Trust-gated tasks (FR-007b) ----------------------------------------------
# Remote-creation tasks are INIT-ONLY and gated on create_remote=true.
# Tool-missing or creation failure → non-fatal exit 0 (warn-and-continue).
# public visibility without consent → hard exit 1 (no silent public creation).
# --- Required tools (spec 016): engine which()-checks these before any render;
# the command -v guard(s) in _tasks remain as the backstop.
_bailiff_requires:
  - glab

_tasks:
  # All creation tasks gate on create_remote — skip them if adopt-existing-repo.
  - command: >-
      command -v glab >/dev/null 2>&1 ||
      { echo "bailiff-mod-gitlab-repo: glab not found — skipping repo creation (non-fatal)." >&2;
      exit 0; }
    when: "{{ create_remote }}"

  # Hard gate: public repos are never created without explicit prior consent.
  - command: >-
      {% if visibility == 'public' %}
      echo "bailiff-mod-gitlab-repo: ABORTED — visibility=public requires manual confirmation." >&2;
      echo "  Run 'glab repo create --public' manually after reviewing the scaffold." >&2;
      exit 1;
      {% endif %}
      true
    when: "{{ create_remote }}"

  # Protocol: glab config controls the remote URL scheme.
  - command: >-
      glab config set git_protocol {{ remote_protocol }}
      || { echo "bailiff-mod-gitlab-repo: glab config set git_protocol failed — skipping (non-fatal)." >&2;
      exit 0; }
    when: "{{ create_remote }}"

  # Repo creation: non-fatal on any failure.
  - command: >-
      glab repo create
      "{{ project_name | default('project', true) | lower | replace(' ', '-') }}"
      --{{ visibility }}
      {% if team %}--group "{{ team }}"{% endif %}
      || { echo "bailiff-mod-gitlab-repo: glab repo create failed — skipping (non-fatal)." >&2;
      exit 0; }
    when: "{{ create_remote }}"

  # Optional push after creation.
  - command: >-
      git push -u origin HEAD
      || { echo "bailiff-mod-gitlab-repo: git push failed — skipping (non-fatal)." >&2; exit 0; }
    when: "{{ create_remote and push_after_create }}"
