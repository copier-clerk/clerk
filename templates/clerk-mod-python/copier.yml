# copier.yml — clerk-mod-python
#
# The Python language overlay: ports project-setup's `lang-python` module (add
# Python tooling — uv, ruff, pytest) as a copier layer that `run_after`
# clerk-mod-base (spec 009 Phase 0). Threads `project_name` from base; seeds a
# pyproject.toml (SEED-ONCE) pinned to the chosen `python_version`; contributes
# its language token into base's shared `gitignore_stack` (single .gitignore
# writer — see clerk-mod-base).
#
# SOURCE: reconciled against the real lang-python manifest at tag
# lang-python-v1.3.0 (srobroek/project-setup: module.toml + module.py). The
# inputs, ordering and ruff config below match that manifest; clerk-model
# adaptations (threaded ruff target-version, gitnr instead of a literal
# .gitignore append, no Phase-0 pre-commit file) are noted inline where they
# occur.
#
# Contract (Constitution VI): ships template/{{ _copier_conf.answers_file }}.jinja;
# NO secret: questions; edges are when:false hidden answers.

# Note: no _answers_file override — copier's default is used (see clerk-mod-base
# for the rationale); clerk passes .copier-answers.clerk-mod-python.yml at
# multi-template init.

# --- Identity + config questions (ported from lang-python [[inputs]]) ---------

# Threaded from base via copier's default: "{{ project_name }}" mechanism
# (ADR-0003 + clerk's data= threading). Standalone fallback: renders empty when
# no upstream base supplied it (US2 #2 / SC-006-style self-containment). Does
# NOT hardcode that *base* supplied it (FR-010). In lang-python this drives
# `uv init --name` and the src/<name>/ package; here it seeds [project].name.
project_name:
  type: str
  default: "{{ project_name }}"
  help: "The project's name (threaded from clerk-mod-base; used in pyproject [project].name)."

# One-line description → pyproject [project].description (lang-python syncs this
# over uv init's placeholder; here it is rendered into the seed).
description:
  type: str
  default: ""
  help: "One-line project description (written into pyproject [project].description)."

# Free-text string, default 3.13 — matches lang-python's `python_version` input
# (a plain string default, NOT a fixed-choice list). Threaded into
# requires-python and the ruff target-version.
python_version:
  type: str
  default: "3.13"
  help: "Python version to target (pins requires-python + ruff target-version)."

# Optional framework hint (fastapi/django/flask; empty = none) — mirrors
# lang-python's `framework` input. Recorded for downstream/agent use; the
# Phase-0 seed does not branch on it (no framework scaffolding ported).
framework:
  type: str
  default: ""
  help: "Framework (optional, e.g. fastapi, django, flask — leave empty for none)."

# --- Agent-resolved pins (lang-python's resolve step) ------------------------
# In lang-python pinned_deps/dev_deps/ruff_version are normally produced by the
# Tier-2 `resolve` agent step and frozen into answers. clerk Phase 0 has no
# Tier-2 resolver, so they are plain injectable answers (default empty): a
# pre-resolving agent or a scripted --data run can supply exact name@version
# pins; empty → no deps written (faithful to lang-python's "empty → no deps").
pinned_deps:
  type: yaml
  default: []
  help: "Pinned runtime dependencies (name@version), if pre-resolved; empty = none."

dev_deps:
  type: yaml
  default: []
  help: "Pinned dev dependencies (name@version), if pre-resolved; empty = none."

ruff_version:
  type: str
  default: ""
  help: "Pinned ruff version, if pre-resolved (used by the pre-commit hook when precommit-setup lands)."

# `today` is injected by clerk at init and frozen into the recorded answers
# (FR-007); never sourced from jinja2_time (Constitution V). Present so the
# overlay's answers file is uniform with base.
today:
  type: str
  default: ""
  help: "The generation date (YYYY-MM-DD); clerk injects this — leave blank."

# --- Dependency edges (when:false hidden answers — FR-004) -------------------
# lang-python's `[order] after = ["gitignore-generate", "precommit-setup"]`. In
# clerk Phase 0 gitignore-generate is collapsed inside clerk-mod-base and
# precommit-setup does not exist yet, so the single edge is run_after
# clerk-mod-base (ADR-0003 / plan Ordering). When clerk-mod-precommit lands, add
# it to run_after to restore the second half of the upstream edge.
run_after:
  type: yaml
  default:
    - clerk-mod-base
  when: false

depends_on:
  type: yaml
  default: []
  when: false

run_before:
  type: yaml
  default: []
  when: false

# The template body lives under template/ so copier renders only that subtree.
_subdirectory: template

# --- Seed-once files (FR-005a / Q3 / D-009-7) --------------------------------
# pyproject.toml is a language manifest: seeded with initial config once, then
# the project adds/bumps deps. Re-rendering would revert real work. On a
# fresh-checkout reproduce it does not yet exist so it still renders
# (Constitution III holds).
_skip_if_exists:
  - pyproject.toml

# --- Trust-gated tasks (FR-007b / Q6) ----------------------------------------
# uv preflight, ordered FIRST: checks `uv` on PATH and fails with the astral
# install URL before any consequential task runs. This overlay writes no
# .gitignore itself — lang-python appends a literal Python block
# (templates/gitignore-block.txt: __pycache__, *.py[cod], *.egg-info, dist,
# build, .venv, .pytest_cache, .ruff_cache); in clerk that block is instead
# contributed as a gitnr stack token into clerk-mod-base's single gitignore
# writer (Q7 decision — one .gitignore writer, no double-append).
#
# lang-python also appends ruff pre-commit hooks
# (templates/precommit-block.yaml: astral-sh/ruff-pre-commit rev v0.6.9, hooks
# `ruff --fix` + `ruff-format`) to the .pre-commit-config.yaml OWNED BY the
# precommit-setup module. precommit-setup is a Phase-1 module not present in
# Phase 0, so there is no .pre-commit-config.yaml to append to — this overlay
# deliberately does not fabricate a standalone one. The hook block moves here
# (rev pinned from ruff_version) when clerk-mod-precommit lands.
_tasks:
  - >-
    command -v uv >/dev/null 2>&1 ||
    { echo "clerk-mod-python: required tool 'uv' not found on PATH." >&2;
    echo "  uv — https://docs.astral.sh/uv/getting-started/installation/" >&2;
    exit 1; }
