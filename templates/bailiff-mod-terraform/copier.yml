# copier.yml — bailiff-mod-terraform
#
# IaC overlay for Terraform / OpenTofu projects. Generic skeleton — does NOT
# ask cloud_provider or state_backend (user configures those via commented
# examples in backend.tf). Works standalone or depends_on bailiff-mod-base.
#
# MANAGED: versions.tf, .tflint.hcl, .terraform-version
# SEED-ONCE: main.tf, variables.tf, outputs.tf, backend.tf, terraform.tfvars.example
# TASK-OUTPUT: .terraform.lock.hcl (via init; COMMITTED, not gitignored)
# .terraform/ IS gitignored (fragment at template/.gitignore.d/bailiff-mod-terraform)
#
# Contract (Constitution VI / FR-021): ships template/{{ _copier_conf.answers_file }}.jinja;
# NO secret: questions; edges are when:false hidden answers.

# --- Cross-module facts (spec 014 FR-006 / _facts.md) ----------------------
# base produces project_name. Reading _external_data.base.* makes base a HARD dependency.
_external_data:
  base: .copier-answers.bailiff-mod-base.yml

# --- Questions ---------------------------------------------------------------

# project_name read from base's answers file via _external_data alias.
project_name:
  type: str
  default: "{{ _external_data.base.project_name }}"
  help: "Project name (read from base via _external_data; standalone: empty)."

# Flavor: terraform (HashiCorp) or opentofu (CNCF fork with MPL-free license).
# The choice drives which binary is invoked in tasks and which lockfile backend
# comment is rendered in backend.tf.
tf_flavor:
  type: str
  choices:
    - terraform
    - opentofu
  default: terraform
  help: "IaC flavor: 'terraform' (HashiCorp) or 'opentofu' (CNCF fork)."

# Terraform version string — used when tf_flavor=terraform.
terraform_version:
  type: str
  default: "1.12.2"
  when: "{{ tf_flavor == 'terraform' }}"
  help: "Terraform version to pin (used when tf_flavor=terraform)."

# OpenTofu version string — used when tf_flavor=opentofu.
opentofu_version:
  type: str
  default: "1.10.0"
  when: "{{ tf_flavor == 'opentofu' }}"
  help: "OpenTofu version to pin (used when tf_flavor=opentofu)."

# tflint version — pinned in .mise/conf.d/bailiff-mod-terraform.toml and .tflint.hcl.
tflint_version:
  type: str
  default: "0.57.0"
  help: "tflint version to pin."

# Injectable rev for antonbabenko/pre-commit-terraform hook repo.
# Agent or --data may override; the default is a real pin so a terraform+precommit
# stack yields a schema-valid .pre-commit-config.yaml out of the box (pre-commit
# requires a `rev` per repo). Empty string opts out of pinning (fragment omits rev).
pre_commit_terraform_rev:
  type: str
  default: "v1.108.0"
  help: "Rev (tag) for antonbabenko/pre-commit-terraform in the pre-commit fragment."

# placement_dir controls the subdirectory inside the repo where IaC files land.
# Default 'infrastructure'; use '.' for a standalone IaC-only repo.
# bare-private: exclusive IaC sibling (terraform/cdk/cloudformation — never co-occur).
placement_dir:
  type: str
  default: "infrastructure"
  help: "Subdirectory for IaC files (default: infrastructure; use '.' for repo root)."

today:
  type: str
  default: ""
  help: "Generation date (YYYY-MM-DD); injected by bailiff — leave blank."

# --- Capability tags (spec 013 — engine enforces warn-only exclusion) --------
_bailiff_provides:
  - iac-tool
_bailiff_exclusive: true

# --- Phase + dependency edges (FR-019/FR-020/R7/R8) -------------------------
_bailiff_phase: normal

# depends_on: base is the HARD data-dependency for project_name (declared via
# _external_data above). Engine enforces ordering (FR-019/R7 — no run_after/run_before).
depends_on:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

# The template body lives under template/ so copier renders only that subtree.
_subdirectory: template

# --- Seed-once files (FR-005a) -----------------------------------------------
# These files are starter skeletons that the project will customise. Re-rendering
# would overwrite resource definitions, variable declarations, and state config.
_skip_if_exists:
  - "{{ placement_dir }}/main.tf"
  - "{{ placement_dir }}/variables.tf"
  - "{{ placement_dir }}/outputs.tf"
  - "{{ placement_dir }}/backend.tf"
  - "{{ placement_dir }}/terraform.tfvars.example"

# --- Trust-gated tasks (FR-007b / Q6) ----------------------------------------
# Ordered: preflight first, then init (network, provider download) guarded so it
# only runs on a fresh tree. NEVER terraform apply.
# --- Required tools (spec 016): engine which()-checks these before any render;
# the command -v guard(s) in _tasks remain as the backstop.
_bailiff_requires:
  - mise

_tasks:
  # Preflight: check mise is available.
  - >-
    command -v mise >/dev/null 2>&1 ||
    { echo "bailiff-mod-terraform: required tool 'mise' not found on PATH." >&2;
    echo "  mise — https://mise.jdx.dev" >&2;
    exit 1; }
  # Preflight: check the IaC binary is available via mise.
  - >-
    {% if tf_flavor == 'opentofu' -%}
    command -v tofu >/dev/null 2>&1 ||
    { echo "bailiff-mod-terraform: 'tofu' not found; run: mise install" >&2; exit 1; }
    {%- else -%}
    command -v terraform >/dev/null 2>&1 ||
    { echo "bailiff-mod-terraform: 'terraform' not found; run: mise install" >&2; exit 1; }
    {%- endif %}
  # Init-only-guarded terraform/tofu init (network, provider download).
  # Uses a sentinel file (.bailiff-tf-init-done) because .terraform.lock.hcl is
  # only created when required_providers are defined — de-opinionated templates
  # comment those out, so the lockfile never appears and init would re-run on
  # every reproduce (network call). Sentinel pattern matches cdk module.
  - >-
    {% if tf_flavor == 'opentofu' -%}
    test -f {{ placement_dir }}/.bailiff-tf-init-done ||
    (cd {{ placement_dir }} && tofu init && touch .bailiff-tf-init-done)
    {%- else -%}
    test -f {{ placement_dir }}/.bailiff-tf-init-done ||
    (cd {{ placement_dir }} && terraform init && touch .bailiff-tf-init-done)
    {%- endif %}
