# copier.yml — bailiff-mod-cocogitto
#
# Conventional-commit + cog-driven release discipline (spec 012 / FR-007) — the
# same setup bailiff itself dogfoods. Renders a MANAGED `cog.toml` sized to the
# project shape (single vs monorepo from the base `layout` fact).
#
# NO release actions at scaffold time: no `cog bump`, no tag creation, no
# changelog write, no network. Bad commit history cannot fail an init.
#
# CI is left untouched (ledger, FR-007 resolution): CI modules are the single
# owners of workflow/pipeline files; a cog-driven release job is a CI-model
# decision, not release-tool-module scope.
#
# Fragment contributions (spec 014):
#   .mise/conf.d/bailiff-mod-cocogitto.toml  (own tools: cog)
#   .pre-commit.d/bailiff-mod-cocogitto.yaml (commit-msg-lint hook block)
#
# Contract: ships template/{{ _copier_conf.answers_file }}.jinja; NO secret:
# questions; no jinja2_time; edges are when:false hidden answers.

# --- Cross-module facts via _external_data (spec 014 / FR-004) ---------------
# base: project_name, layout — base is a hard dependency (FR-006).
# moon: monorepo_packages — moon is a hard dependency when cocogitto is in a
#       monorepo stack (FR-006); both consumers wire the alias.

_external_data:
  base: .copier-answers.bailiff-mod-base.yml
  moon: .copier-answers.bailiff-mod-moon.yml

# Template body lives under template/ — copier renders only that subtree.
_subdirectory: template

# cog.toml is MANAGED: config-consistent on reproduce.

# --- Dependency edges (when:false hidden answers — FR-004) -------------------

depends_on:
  type: yaml
  default:
    - bailiff-mod-base
    - bailiff-mod-moon
  when: false

phase:
  type: str
  default: normal
  when: false

# --- Trust-gated tasks (FR-007b / FR-012a) -----------------------------------
# Preflight only — cog availability via mise. Init-only-guarded via committed
# sentinel so reproduce over a populated tree never re-shells (FR-012a).
# NO cog bump / tag / changelog at scaffold time (FR-007).
_tasks:
  - >-
    test -f .bailiff-cocogitto-preflight || {
    command -v mise >/dev/null 2>&1 ||
    { echo "bailiff-mod-cocogitto: required tool 'mise' not found on PATH." >&2;
    echo "  mise — https://mise.jdx.dev" >&2;
    exit 1; };
    mise install &&
    printf 'cog-preflight-ok\n' > .bailiff-cocogitto-preflight; }
