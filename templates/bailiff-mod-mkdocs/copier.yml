# copier.yml — bailiff-mod-mkdocs
#
# mkdocs-material docs site over base's docs/ tree (spec 012 / FR-011).
# Pure render — ZERO _tasks, no build/deploy at scaffold time.
#
# Lifecycles:
#   MANAGED: mkdocs.yml (byte-identical on reproduce).
#   SEED-ONCE (_skip_if_exists): docs/index.md — project-owned after init.
#
# Pin strategy (spec 014 / FR-008): mkdocs + mkdocs-material pin via the
# per-module conf.d drop-in (`.mise/conf.d/bailiff-mod-mkdocs.toml`); mise
# merges all conf.d fragments at runtime.
#
# Docs engines are per-engine sibling splits; vitepress is a later sibling,
# NOT an axis here.
#
# Contract: ships template/{{ _copier_conf.answers_file }}.jinja; NO secret:
# questions; no jinja2_time; edges are when:false hidden answers.

# --- External data (FR-004 / spec 014) ----------------------------------------
# Reads project_name + description from base's answers file (hard dependency).

_external_data:
  base: .copier-answers.bailiff-mod-base.yml

# --- Questions ----------------------------------------------------------------

project_name:
  type: str
  default: "{{ _external_data.base.project_name }}"
  help: "The project's name (read from bailiff-mod-base via _external_data; mkdocs site_name)."

description:
  type: str
  default: "{{ _external_data.base.description }}"
  help: "One-line site description (read from bailiff-mod-base via _external_data; mkdocs site_description)."

# --- Dependency edges (when:false hidden answers — FR-004) -------------------

depends_on:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

phase:
  type: str
  default: normal
  when: false

# Template body lives under template/ — copier renders only that subtree.
_subdirectory: template

# docs/index.md is SEED-ONCE: scaffolded once, then project-owned. A re-run
# never clobbers project edits.
_skip_if_exists:
  - docs/index.md

# No _tasks: pure render; no mkdocs build / site deploy at scaffold time (FR-011).
