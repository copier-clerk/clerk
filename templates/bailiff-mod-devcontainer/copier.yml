# copier.yml — bailiff-mod-devcontainer
#
# Reproducible containerized dev environment (spec 012 / FR-005, spec 014 rewrite).
# Pure MANAGED render — ZERO _tasks. `.devcontainer/devcontainer.json` includes the
# mise devcontainer feature; `postCreateCommand` runs bare `mise install` which reads
# the merged `.mise/conf.d/` drop-ins installed by the other modules (FR-009).
#
# Private-by-default (spec 014): no answer accretes into this module's namespace
# from other layers. project_name is read from base's answers file via _external_data.
#
# Base image is FIXED (ledger, FR-005 resolution): the module's value is
# zero-decision reproducibility — no `devcontainer_image` question. Projects
# needing another image edit the file after scaffold.
#
# This module does NOT contribute mise tools; it does NOT write `.mise/conf.d/`
# (no conf.d authored — YAGNI; devcontainer is the consumer of mise, not a tool contributor).
#
# Contract: ships template/{{ _copier_conf.answers_file }}.jinja; NO secret:
# questions; edges are when:false hidden answers.

_subdirectory: template

# --- Cross-module fact aliases (spec 014 FR-004) --------------------------------
# base is a HARD data-dependency: postCreateCommand reads the merged conf.d that
# base and language modules populate, so base must be present in any stack that
# uses devcontainer.

_external_data:
  base: .copier-answers.bailiff-mod-base.yml

# --- Questions ------------------------------------------------------------------

project_name:
  type: str
  default: "{{ _external_data.base.project_name }}"
  help: "The project's name (read from bailiff-mod-base answers via _external_data)."

# --- Dependency edges (when:false hidden answers — spec 014 FR-019) -------------
# Single depends_on edge (run_after/run_before removed per spec 014 R7).

depends_on:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

phase:
  type: str
  default: normal
  when: false

# .devcontainer/devcontainer.json is MANAGED: config-consistent on reproduce.
# No _tasks: pure render (FR-005).
