# copier.yml — clerk-mod-go
#
# The Go language overlay: add Go tooling (go mod, golangci-lint) as a copier
# layer that `run_after` clerk-mod-base (spec 011). Threads `project_name` from
# base; seeds go.mod via `go mod init` (task-output → seed-once); contributes
# its token to the agent-frozen union answers (M1): Go gitignore token to
# `gitignore_stack`, go version to `mise_tools`, golangci hook block to
# `hook_blocks`. Base is the single writer of .gitignore/.mise.toml; precommit
# the single writer of the hook config file.
#
# Contract (Constitution VI): ships template/{{ _copier_conf.answers_file }}.jinja;
# NO secret: questions; ordering edges are when:false hidden answers.

# Threaded from base via copier's default: "{{ project_name }}" mechanism
# (ADR-0003). Standalone fallback: renders empty when no base supplied it
# (SC-006-style self-containment). NOT hardcoded to base (FR-010).
project_name:
  type: str
  default: "{{ project_name }}"
  help: "The project's name (threaded from clerk-mod-base; used in go mod init)."

# Finite modern list — dead/EOL versions are not offered (Constitution).
go_version:
  type: str
  default: "1.23"
  choices:
    - "1.23"
    - "1.22"
    - "1.21"
  help: "Go toolchain version (pinned in mise_tools + go.mod)."

# library drops cmd/ entirely (no empty dir); cli/service get cmd/<name>/main.go stub.
app_kind:
  type: str
  default: cli
  choices:
    - cli
    - service
    - library
  help: "Application layout: cli/service includes cmd/<name>/main.go stub; library omits cmd/."

test_runner:
  type: str
  default: go-test
  choices:
    - go-test
    - gotestsum
  help: "Test runner: go-test (stdlib) or gotestsum (richer output)."

# Conditional: when true, adds 'vendor/' line to Go gitignore token.
use_vendor_mode:
  type: bool
  default: false
  help: "When true, adds 'vendor/' to the Go .gitignore token."

# Injectable string: the rev pinned in the golangci-lint pre-commit hook block
# contributed to hook_blocks. Agent or --data resolves the concrete tag.
golangci_hook_rev:
  type: str
  default: ""
  help: "Rev (tag) for golangci/golangci-lint-action in the pre-commit hook block."

# --- Agent-frozen union answers (M1: NOT runtime accumulation) ---------------
# Phase-1 agent freezes a UNION of all selected modules' contributions and
# injects them via --data. This module contributes its token but does NOT write
# .gitignore or .mise.toml (base is the single writer). Default [] so a
# standalone copier run still renders (SC-006).

gitignore_stack:
  type: yaml
  default: []
  help: "clerk injects this — Go gitignore token lives here (agent-frozen union, base writes .gitignore)."

mise_tools:
  type: yaml
  default: []
  help: "clerk injects this — go version token lives here (agent-frozen union, base writes .mise.toml)."

hook_blocks:
  type: yaml
  default: []
  help: "clerk injects this — golangci hook block lives here (agent-frozen union, precommit writes hook config)."

# hook_manager threaded from whatever upstream layer supplied it (FR-010).
# Needed so .golangci.yml can reference the right runner and for loop tests.
hook_manager:
  type: str
  default: "{{ hook_manager }}"
  help: "Hook manager (threaded; pre-commit/lefthook/none)."

# `today` injected by clerk at init and frozen into recorded answers (FR-007).
today:
  type: str
  default: ""
  help: "The generation date (YYYY-MM-DD); clerk injects this — leave blank."

# --- Dependency edges (when:false hidden answers — FR-004) -------------------
run_after:
  type: yaml
  default:
    - clerk-mod-base
  when: false

depends_on:
  type: yaml
  default: []
  when: false

run_before:
  type: yaml
  default: []
  when: false

# Template body lives under template/ so copier renders only that subtree.
_subdirectory: template

# Exclude cmd/ entirely when app_kind=library (no empty dir — contract requirement).
# The `{%- -%}` strips whitespace; empty string when cli/service → no exclusion.
_exclude:
  - "{%- if app_kind == 'library' -%}cmd{%- endif -%}"

# --- Seed-once files (FR-005a) -----------------------------------------------
# go.mod is the native tool's manifest: seeded via `go mod init`, then the
# project adds/bumps deps. Re-rendering would revert real work.
# .golangci.yml is seed-once: users tune it after init; clobbering loses that.
# cmd/<name>/main.go is the stub entry point: seed-once for cli/service.
_skip_if_exists:
  - go.mod
  - go.sum
  - .golangci.yml
  - "cmd/{{ project_name | default('app', true) | lower | replace(' ', '-') | replace('_', '-') }}/main.go"

# --- Trust-gated tasks (FR-007b) ---------------------------------------------
# go preflight + init-only-guarded `go mod init` (FR-012a sentinel: go.mod).
# Native `go mod init` runs only on a fresh tree; seed-once ensures a populated
# tree reproduce is a no-op (the committed go.mod is used verbatim — R5).
_tasks:
  - >-
    command -v go >/dev/null 2>&1 ||
    { echo "clerk-mod-go: required tool 'go' not found on PATH." >&2;
    echo "  go — https://go.dev/doc/install (or use mise: mise install go)" >&2;
    exit 1; }
  - >-
    test -f go.mod ||
    go mod init "{{ project_name | default('app', true) | lower | replace(' ', '-') | replace('_', '-') }}"
