# copier.yml — clerk-mod-github-repo
#
# Pure side-effect module: creates the GitHub remote for the project.
# Writes NO files (reconcile=false; the template/ subtree holds only the
# answers-file marker). Idempotent: `gh repo create --source . origin` is
# gated so that if creation fails (repo already exists, no auth, gh absent)
# the task exits 0 — warn-and-continue, never abort the whole init run.
# Public repos keep a HARD exit-1 gate: the user must have explicitly set
# visibility=public (no silent public creation).
#
# Token source: ambient GITHUB_TOKEN (or GITHUB_APM_PAT for legacy callers).
# No secret: questions — Constitution VI / FR-005.
#
# Contract: docs-integration.md §clerk-mod-github-repo
#   default_enabled=false; run_after: [clerk-mod-base]; reconcile=false.

# Threaded from base so the module can embed the name in task echo output.
project_name:
  type: str
  default: "{{ project_name }}"
  help: "The project's name (threaded from clerk-mod-base)."

# Repository visibility. public keeps the HARD exit-1 abort gate.
visibility:
  type: str
  choices:
    - private
    - public
    - internal
  default: private
  help: "GitHub repository visibility. public triggers a hard consent gate — set intentionally."

# Whether to use HTTPS or SSH for the remote URL.
remote_protocol:
  type: str
  choices:
    - https
    - ssh
  default: https
  help: "Remote URL protocol (https or ssh)."

# Push the local branch after repo creation.
push_after_create:
  type: bool
  default: false
  help: "Push the current branch to origin after repo creation?"

# Optional team to grant access (empty = omit --team flag).
team:
  type: str
  default: ""
  help: "GitHub team slug to grant access after creation (leave empty to omit)."

# --- Dependency edges (when:false hidden answers — FR-004) -------------------
run_after:
  type: yaml
  default:
    - clerk-mod-base
  when: false

depends_on:
  type: yaml
  default: []
  when: false

run_before:
  type: yaml
  default: []
  when: false

# Template subtree: only the answers-file marker lives here (no rendered files).
_subdirectory: template

# No managed or seed-once files — this module produces no file output.

# --- Trust-gated tasks (FR-007b) ----------------------------------------------
# reconcile=false: these tasks are INIT-ONLY (not re-run on reproduce/update).
# Tool-missing or creation failure → non-fatal exit 0 (warn-and-continue).
# public visibility without consent → hard exit 1 (no silent public creation).
_tasks:
  # Preflight: check gh is available. Missing tool is non-fatal per contract.
  - >-
    command -v gh >/dev/null 2>&1 ||
    { echo "clerk-mod-github-repo: gh not found — skipping repo creation (non-fatal)." >&2;
    exit 0; }

  # Hard gate: public repos are never created without explicit prior consent.
  # There is no runtime confirmation question (Constitution VI / no secret:),
  # so visibility=public always aborts with exit 1. Users who truly want a
  # public repo must use `gh repo create` manually after scaffolding.
  - >-
    {% if visibility == 'public' %}
    echo "clerk-mod-github-repo: ABORTED — visibility=public requires manual confirmation." >&2;
    echo "  Run 'gh repo create --source . --public' manually after reviewing the scaffold." >&2;
    exit 1;
    {% endif %}
    true

  # Repo creation: non-fatal on any failure (gh error → warn and continue).
  # --source . means the current directory is the local source; origin is the
  # remote name copier-clerk convention uses.
  - >-
    gh repo create
    --source .
    --remote origin
    --{{ visibility }}
    {% if team %}--team {{ team }}{% endif %}
    {% if remote_protocol == 'ssh' %}--ssh{% else %}--https{% endif %}
    || { echo "clerk-mod-github-repo: gh repo create failed — skipping (non-fatal)." >&2;
    exit 0; }

  # Optional push after creation (gated on push_after_create answer).
  - command: >-
      git push -u origin HEAD
      || { echo "clerk-mod-github-repo: git push failed — skipping (non-fatal)." >&2; exit 0; }
    when: "{{ push_after_create }}"
