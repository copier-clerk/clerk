# copier.yml — clerk-mod-ts
#
# TypeScript/JavaScript language overlay (spec 011 T007). Applies after
# clerk-mod-base (run_after), threads project_name and hook_manager from the
# phase-1 agent's frozen --data answers.
#
# Frozen-union contract (M1): gitignore_stack, mise_tools, and hook_blocks are
# ALL agent-frozen and injected via --data — this module contributes its token
# to those unions but does NOT accumulate at runtime (ordering tie-break makes
# that unreliable). Base writes .gitignore + .mise.toml; precommit writes the
# hook config file.
#
# Constitution VI: ships template/{{ _copier_conf.answers_file }}.jinja.
# No secret: questions anywhere in this file.

_subdirectory: template

# --- Frozen-union threading (M1 / FR-010) ------------------------------------
# The phase-1 agent freezes the full union and injects all of these via --data.
# Threaded axes use default: "{{ <key> }}" so downstream layers inherit without
# hardcoding which layer supplied them (FR-010). Defaults here are the empty /
# zero-state so standalone runs (US2 #2) are a valid no-op.

# Threaded from base via default: "{{ project_name }}" pattern (ADR-0003).
project_name:
  type: str
  default: "{{ project_name }}"
  help: "Project name (threaded from clerk-mod-base)."

# hook_manager is a frozen union answer injected by the phase-1 agent (M1 §4).
# This module does NOT write the hook file; it contributes its hook block to
# hook_blocks (another frozen union answer). pre-commit is the safe default.
hook_manager:
  type: str
  choices:
    - pre-commit
    - lefthook
    - none
  default: "{{ hook_manager | default('pre-commit') }}"
  help: "Hook manager (threaded from phase-1 agent; single writer: clerk-mod-precommit)."

# gitignore_stack — frozen union injected by the phase-1 agent. Base is the
# single writer of .gitignore; ts contributes the 'Node' token. Default []
# keeps standalone runs clean.
gitignore_stack:
  type: yaml
  default: []
  help: "Gitignore token union (injected by phase-1 agent; base writes .gitignore)."

# mise_tools — frozen union injected by the phase-1 agent. Base is the single
# writer of .mise.toml; ts contributes {node: <node_version>}. Default []
# keeps standalone runs clean.
mise_tools:
  type: yaml
  default: []
  help: "mise [tools] union (injected by phase-1 agent; base writes .mise.toml)."

# hook_blocks — frozen union injected by the phase-1 agent. precommit is the
# single writer of the hook config file; ts contributes its linter hook block.
hook_blocks:
  type: yaml
  default: []
  help: "Hook config blocks union (injected by phase-1 agent; precommit writes hook file)."

# today — injected by clerk at init (Constitution V); never jinja2_time.
today:
  type: str
  default: ""
  help: "Generation date (YYYY-MM-DD); clerk injects this — leave blank."

# --- TypeScript / JavaScript questions (T007 contract) -----------------------

# Package manager: yarn DEAD (dropped per spec 011 contract).
js_pkg_manager:
  type: str
  choices:
    - bun
    - pnpm
    - npm
  default: bun
  help: "JavaScript/TypeScript package manager (yarn DEAD — not offered)."

# Linter: biome or eslint+prettier. Both ship managed byte-identical config.
# biome branch keeps an md/yaml-scoped prettier hook (spec 011 fix).
ts_linter:
  type: str
  choices:
    - biome
    - eslint-prettier
  default: biome
  help: "TypeScript linter/formatter (biome or eslint+prettier)."

# Test runner: jest DEAD (dropped per spec 011 contract).
test_runner:
  type: str
  choices:
    - none
    - vitest-node
    - vitest-browser
    - vitest+playwright
    - bun-test
    - playwright-only
  default: none
  help: "Test runner (jest DEAD — not offered)."

# Node version — finite modern list, default 22 (current LTS).
node_version:
  type: str
  choices:
    - "24"
    - "22"
    - "20"
    - "18"
  default: "22"
  help: "Node.js version (pinned via mise_tools in .mise.toml)."

# Framework: plain means no framework scaffold.
# nuxi/create-vite are pinned (no @latest) — spec 011 bug fix.
framework:
  type: str
  choices:
    - plain
    - nuxt
    - vite
    - sst
  default: plain
  help: "Framework preset (nuxi/create-vite are version-pinned, not @latest)."

# vite_template — only asked when framework=vite (conditional visibility).
vite_template:
  type: str
  default: vanilla-ts
  when: "{{ framework == 'vite' }}"
  help: "Vite scaffold template (e.g. vanilla-ts, react-ts, vue-ts)."

# UI kit: none or shadcn. shadcn is a follow-on step, not a native init.
ui_kit:
  type: str
  choices:
    - none
    - shadcn
  default: none
  help: "UI component kit (shadcn is a separate setup step post-scaffold)."

# --- Dependency edges (when:false hidden answers — FR-004) -------------------

run_after:
  type: yaml
  default:
    - clerk-mod-base
  when: false

depends_on:
  type: yaml
  default: []
  when: false

run_before:
  type: yaml
  default: []
  when: false

# --- Seed-once files (FR-012a / M3) ------------------------------------------
# package.json is the native-init manifest (bun init / pnpm init). Once it
# exists, reproduce and re-runs must not clobber project edits. The native init
# task is init-only-guarded (`test -f package.json || ...`) so on a populated
# tree the task is a no-op and the committed manifest is used verbatim.
# pnpm workspaces use pnpm-workspace.yaml (also seed-once).
_skip_if_exists:
  - package.json
  - pnpm-workspace.yaml

# --- Trust-gated tasks (FR-007 / ADR-0007) -----------------------------------
# Tasks ordered: (1) preflight checks, (2) native init (init-only-guarded),
# (3) framework-specific scaffold (init-only-guarded).
# Network/tool tasks must be trust-gated (copier --trust required).
#
# Bun 1.2 uses bun.lock (text lockfile), NOT bun.lockb (binary).
# Cache keys in CI should reference bun.lock (spec 011 bug fix).
_tasks:
  # --- Tool preflight (ordered first) ---
  - >-
    command -v mise >/dev/null 2>&1 ||
    { echo "clerk-mod-ts: required tool 'mise' not found on PATH." >&2;
    echo "  mise — https://mise.jdx.dev" >&2;
    exit 1; }
  - >-
    mise install 2>&1 ||
    { echo "clerk-mod-ts: 'mise install' failed — check .mise.toml entries." >&2;
    exit 1; }

  # --- Native manifest scaffold (init-only-guarded, task-output → seed-once) ---
  # bun init writes package.json (bun.lock text file since Bun 1.2, not bun.lockb).
  - command: >-
      test -f package.json ||
      bun init --yes
    when: "{{ js_pkg_manager == 'bun' }}"

  # pnpm init writes package.json; pnpm workspace uses pnpm-workspace.yaml.
  - command: >-
      test -f package.json ||
      pnpm init
    when: "{{ js_pkg_manager == 'pnpm' }}"

  - command: >-
      test -f package.json ||
      npm init --yes
    when: "{{ js_pkg_manager == 'npm' }}"

  # --- Framework scaffold (init-only-guarded, pinned versions — no @latest) ---
  # nuxt: nuxi@3.23.1 is the last stable without breaking changes as of spec 011.
  # vite: create-vite@6.5.0 pinned; template from vite_template answer.
  # sst: sst@3.x init (no deploy — irreversible actions are forbidden, M3).
  - command: >-
      test -f nuxt.config.ts ||
      npx nuxi@3.23.1 init . --packageManager {{ js_pkg_manager }} --gitInit false
    when: "{{ framework == 'nuxt' }}"

  - command: >-
      test -f vite.config.ts || test -f vite.config.js ||
      npx create-vite@6.5.0 . --template {{ vite_template }}
    when: "{{ framework == 'vite' }}"

  # sst init is safe (writes sst.config.ts only, no deploy/bootstrap).
  # .gitignore entries for sst (.sst/, .open-next/) are in gitignore_stack.
  - command: >-
      test -f sst.config.ts ||
      npx sst@3 init
    when: "{{ framework == 'sst' }}"
