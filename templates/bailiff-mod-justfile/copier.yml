# copier.yml — bailiff-mod-justfile
#
# Generates a justfile seeded with the fixed recipe set (default/test/lint/build/dev/clean).
# The justfile is SEED-ONCE so user edits survive reproduce. Recipe bodies are
# per-language idiomatic where possible, or fail-loud stubs when language="".
# The `lint` recipe reads the frozen hook_manager; `test` uses the frozen
# js_pkg_manager (never hardcoded npm). just IS the task-runner choice here
# (make/task = future modules — YAGNI).
#
# hook_manager and js_pkg_manager are agent-fed --data facts (R13: sometimes-absent
# producer class). They carry standalone defaults so justfile works without
# bailiff-mod-precommit or any ts/js module in the stack. They are NOT read via
# _external_data and bailiff-mod-precommit/bailiff-mod-ts are NOT in depends_on.
#
# Contract: specs/011-deopinionated-module-family/contracts/quality-tooling.md
# Cross-cutting: specs/011-deopinionated-module-family/contracts/_cross-cutting.md §1,§4
#
# Constitution VI: ships template/{{ _copier_conf.answers_file }}.jinja;
# NO secret: questions; ordering edge is depends_on (spec 014 R7).

# --- Language / tooling axes (cross-cutting §1 FR-002) -----------------------

# Language choice drives recipe bodies. Empty string ("") → fail-loud stubs that
# print a "not configured" message and exit 1, so maintainers notice the gap.
language:
  type: str
  choices:
    - python
    - ts
    - go
    - rust
    - ""
  default: ""
  help: "Primary language for recipe bodies. Empty = fail-loud stubs."

# Threaded from an upstream ts/js layer (cross-cutting §1); standalone default
# bun. Uses default: "{{ js_pkg_manager }}" so a pre-set answer threads through
# without hardcoding which layer supplied it (FR-010).
js_pkg_manager:
  type: str
  choices:
    - bun
    - pnpm
    - npm
  default: "{{ js_pkg_manager }}"
  help: "JS package manager (threaded from upstream; standalone default bun)."

# Threaded from bailiff-mod-precommit (cross-cutting §4); standalone default
# pre-commit. The `lint` recipe emits the right invocation or degrades when none.
hook_manager:
  type: str
  choices:
    - pre-commit
    - lefthook
    - none
  default: "{{ hook_manager }}"
  help: "Hook manager for the lint recipe (threaded from bailiff-mod-precommit; standalone default pre-commit)."

# --- Dependency edge (spec 014 R7: depends_on is the only ordering edge) -----
# bailiff-mod-base must run before justfile (provides the project scaffold).
# bailiff-mod-precommit and ts/js modules are NOT hard dependencies — hook_manager
# and js_pkg_manager are agent-fed --data facts with standalone defaults (R13).
depends_on:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

# Phase: normal (spec 014 FR-020/R8).
_bailiff_phase: normal

# The template body lives under template/ so copier renders only that subtree.
_subdirectory: template

# --- Seed-once files (FR-005a) -----------------------------------------------
# The justfile is a user-maintained task file: seeded once with idiomatic recipe
# stubs, then customised by the project. Re-rendering would clobber real work.
_skip_if_exists:
  - justfile

# No network/tool tasks: this module only renders a static file. No _tasks block.
