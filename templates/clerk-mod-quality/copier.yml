# copier.yml — clerk-mod-quality
#
# Single writer of .agents/hooks/quality-languages: a sorted-unique list of
# active language identifiers, one per line. The phase-1 agent freezes the
# quality_languages union (all active language tokens) and injects it via
# --data; this module renders the file deterministically from that frozen
# answer. Empty list → file omitted entirely (Jinja conditional on directory
# name suppresses the path). Pure render: no _tasks.
#
# Contract (_cross-cutting §5, M1): agent-frozen union → single writer,
# same pattern as gitignore_stack (clerk-mod-base). NOT runtime accumulation.
# MANAGED (not seed-once): reconcile=true, byte-identical on init and reproduce.
#
# Constitution compliance: no secret: questions; no jinja2_time.

# Agent-frozen union answer: the phase-1 agent assembles the full set of active
# language identifiers (e.g. ["python", "typescript"]) and injects via --data.
# Open list, NOT a choices: dropdown (M1 contract: de-opinionated open union).
quality_languages:
  type: yaml
  default: []
  help: "clerk injects this — sorted list of active language identifiers (e.g. [python, typescript])."

# --- Dependency edges (when:false hidden answers — FR-004) -------------------
run_after:
  type: yaml
  default:
    - clerk-mod-base
  when: false

depends_on:
  type: yaml
  default: []
  when: false

run_before:
  type: yaml
  default: []
  when: false

# Template body lives under template/ — copier renders only that subtree.
_subdirectory: template
