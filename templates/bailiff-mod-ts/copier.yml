# copier.yml — bailiff-mod-ts
#
# TypeScript/JavaScript language overlay (spec 011 T007 / spec 014 rewrite).
# Applies after bailiff-mod-base (depends_on), reads project_name and
# hook_manager from producer answers files via _external_data (spec 014 FR-004).
#
# Private-by-default (spec 014): no answer accretes into this module's namespace
# from other layers. Cross-module values are read via _external_data aliases
# at render time; they do NOT appear in this module's answers file.
#
# ts is a FACT PRODUCER for the `ts` alias:
#   js_pkg_manager — read by justfile, package-add
#   ts_linter      — read by editorconfig
#
# Fragment contributions (spec 014 / _fragment-merge.md):
#   .mise/conf.d/bailiff-mod-ts.toml       — node version (mise native drop-in)
#   .pre-commit.d/bailiff-mod-ts.yaml      — linter hook block
#   .gitignore.d/bailiff-mod-ts            — Node gitignore lines
#
# Constitution VI: ships template/{{ _copier_conf.answers_file }}.jinja.
# No secret: questions anywhere in this file.

_subdirectory: template

# --- TypeScript / JavaScript questions (T007 contract) -----------------------
# These are bare questions — ts is the producer; consumers read them via alias.
# ts does not consume cross-module facts: project_name is not used in any ts
# template or task, and hook_manager is handled by the bundler's post-task.
# If a future ts template needs a cross-module value, add _external_data then.

# Package manager: yarn DEAD (dropped per spec 011 contract).
js_pkg_manager:
  type: str
  choices:
    - bun
    - pnpm
    - npm
  default: bun
  help: "JavaScript/TypeScript package manager (yarn DEAD — not offered)."

# Linter: biome or eslint+prettier. Both ship managed byte-identical config.
# biome branch keeps an md/yaml-scoped prettier hook (spec 011 fix).
ts_linter:
  type: str
  choices:
    - biome
    - eslint-prettier
  default: biome
  help: "TypeScript linter/formatter (biome or eslint+prettier)."

# Test runner: jest DEAD (dropped per spec 011 contract).
# PRIVATE — collision class (ts {none,vitest-*,bun-test,playwright-only} vs
# go {go-test,gotestsum} vs rust {cargo-test,nextest}). Not a fact.
test_runner:
  type: str
  choices:
    - none
    - vitest-node
    - vitest-browser
    - vitest+playwright
    - bun-test
    - playwright-only
  default: none
  help: "Test runner (jest DEAD — not offered)."

# Node version — finite modern list, default 22 (current LTS).
node_version:
  type: str
  choices:
    - "24"
    - "22"
    - "20"
    - "18"
  default: "22"
  help: "Node.js version (pinned via mise conf.d drop-in)."

# ts_framework: plain means no framework scaffold.
# nuxi/create-vite are pinned (no @latest) — spec 011 bug fix.
ts_framework:
  type: str
  choices:
    - plain
    - nuxt
    - vite
    - sst
  default: plain
  help: "Framework preset (nuxi/create-vite are version-pinned, not @latest)."

# vite_template — only asked when ts_framework=vite (conditional visibility).
vite_template:
  type: str
  default: vanilla-ts
  when: "{{ ts_framework == 'vite' }}"
  help: "Vite scaffold template (e.g. vanilla-ts, react-ts, vue-ts)."

# UI kit: none or shadcn. shadcn is a follow-on step, not a native init.
ui_kit:
  type: str
  choices:
    - none
    - shadcn
  default: none
  help: "UI component kit (shadcn is a separate setup step post-scaffold)."

# today — injected by bailiff at init (Constitution V); never jinja2_time.
today:
  type: str
  default: ""
  help: "Generation date (YYYY-MM-DD); bailiff injects this — leave blank."

# --- Dependency edges (when:false hidden answers — spec 014 FR-019) ----------
# Single depends_on edge (run_after/run_before removed per spec 014 R7).

depends_on:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

phase:
  type: str
  default: normal
  when: false

# --- Seed-once files (FR-012a / M3) ------------------------------------------
# package.json is the native-init manifest (bun init / pnpm init). Once it
# exists, reproduce and re-runs must not clobber project edits. The native init
# task is init-only-guarded (`test -f package.json || ...`) so on a populated
# tree the task is a no-op and the committed manifest is used verbatim.
# pnpm workspaces use pnpm-workspace.yaml (also seed-once).
_skip_if_exists:
  - package.json
  - pnpm-workspace.yaml

# --- Trust-gated tasks (FR-007 / ADR-0007) -----------------------------------
# Tasks ordered: (1) preflight checks, (2) native init (init-only-guarded),
# (3) framework-specific scaffold (init-only-guarded).
# Network/tool tasks must be trust-gated (copier --trust required).
#
# Bun 1.2 uses bun.lock (text lockfile), NOT bun.lockb (binary).
# Cache keys in CI should reference bun.lock (spec 011 bug fix).
# --- Required tools (spec 016): engine which()-checks these before any render;
# the command -v guard(s) in _tasks remain as the backstop.
_bailiff_requires:
  - mise

_tasks:
  # --- Tool preflight (ordered first) ---
  - >-
    command -v mise >/dev/null 2>&1 ||
    { echo "bailiff-mod-ts: required tool 'mise' not found on PATH." >&2;
    echo "  mise — https://mise.jdx.dev" >&2;
    exit 1; }
  # Init-only-guarded (FR-012a / cross-cutting §2): sentinel prevents re-shelling
  # on reproduce over a populated tree. The sentinel is committed so base's
  # .gitignore does not strip it; `mise install` only runs on a genuinely fresh init.
  - >-
    test -f .bailiff-ts-mise-installed ||
    { mise install 2>&1 ||
    { echo "bailiff-mod-ts: 'mise install' failed — check .mise/conf.d/ entries." >&2;
    exit 1; }; touch .bailiff-ts-mise-installed; }

  # --- Native manifest scaffold (init-only-guarded, task-output → seed-once) ---
  # bun init writes package.json (bun.lock text file since Bun 1.2, not bun.lockb).
  - command: >-
      test -f package.json ||
      bun init --yes
    when: "{{ js_pkg_manager == 'bun' }}"

  # pnpm init writes package.json; pnpm workspace uses pnpm-workspace.yaml.
  - command: >-
      test -f package.json ||
      pnpm init
    when: "{{ js_pkg_manager == 'pnpm' }}"

  - command: >-
      test -f package.json ||
      npm init --yes
    when: "{{ js_pkg_manager == 'npm' }}"

  # --- Framework scaffold (init-only-guarded, pinned versions — no @latest) ---
  # nuxt: nuxi@3.23.1 is the last stable without breaking changes as of spec 011.
  # vite: create-vite@6.5.0 pinned; template from vite_template answer.
  # sst: sst@3.x init (no deploy — irreversible actions are forbidden, M3).
  - command: >-
      test -f nuxt.config.ts ||
      npx nuxi@3.23.1 init . --packageManager {{ js_pkg_manager }} --gitInit false
    when: "{{ ts_framework == 'nuxt' }}"

  - command: >-
      test -f vite.config.ts || test -f vite.config.js ||
      npx create-vite@6.5.0 . --template {{ vite_template }}
    when: "{{ ts_framework == 'vite' }}"

  # sst init is safe (writes sst.config.ts only, no deploy/bootstrap).
  # .gitignore entries for sst (.sst/, .open-next/) are in the gitignore fragment.
  # --yes bypasses the interactive "Continue?" prompt so it runs unattended.
  - command: >-
      test -f sst.config.ts ||
      npx --yes sst@3 init
    when: "{{ ts_framework == 'sst' }}"
