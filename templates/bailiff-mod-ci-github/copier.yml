# copier.yml — bailiff-mod-ci-github
#
# GitHub Actions CI workflow — pure managed render (ZERO _tasks).
# ALL sizing facts arrive AGENT-FROZEN via --data (never runtime threading).
# Contract: specs/011-deopinionated-module-family/contracts/ci-github-gitlab.md
#
# Constitution VI: ships template/{{ _copier_conf.answers_file }}.jinja; NO
# secret: questions; edges are when:false hidden answers.

# Note: no _answers_file override — copier's default (.copier-answers.yml) is used.
# The template/{{ _copier_conf.answers_file }}.jinja file ensures the answers are
# recorded for reproduce (FR-016).

_subdirectory: template

_external_data:
  base: .copier-answers.bailiff-mod-base.yml
  moon: .copier-answers.bailiff-mod-moon.yml

# --- CI model + orthogonal knobs -------------------------------------------

ci_model:
  type: str
  choices:
    - minimal
    - standard
    - optimized
    - monorepo-affected
    - merge-queue
  default: minimal
  help: "CI workflow model to render."

ci_cache:
  type: bool
  default: true
  help: "Enable per-language dependency caching."

ci_concurrency_cancel:
  type: bool
  default: true
  help: "Cancel in-progress runs on new push (concurrency: cancel-in-progress)."

ci_os_matrix:
  type: yaml
  default: []
  help: "Additional OS targets for the matrix (e.g. [windows-latest, macos-latest]). Empty = ubuntu-latest only."

ci_matrix_versions:
  type: yaml
  default: []
  help: "Additional language-version matrix entries. Empty = single version from ci_lang_facts."

ci_oidc_provider:
  type: str
  default: none
  help: "OIDC provider to configure id-token:write permissions for (e.g. aws, gcp). 'none' = disabled."

ci_required_gate:
  type: bool
  default: true
  help: "Emit a required-status fan-in gate job. Suppressed automatically on 'minimal' model."

# --- Language facts (AGENT-FROZEN via --data) -------------------------------

ci_languages:
  type: yaml
  default: []
  help: "Active language identifiers (e.g. [python, typescript]). AGENT-FROZEN — inject via --data."

ci_lang_facts:
  type: yaml
  default: {}
  help: "Per-language facts keyed by language id: {python: {manager: uv, version: '3.13', test_runner: pytest, image: ''}, ...}. AGENT-FROZEN."

# --- Monorepo (fact from bailiff-mod-moon via _external_data) ---------------

monorepo_tool:
  type: str
  default: "{{ _external_data.moon.monorepo_tool }}"
  help: "Monorepo tool (turborepo, nx, pnpm-workspace, moon) for monorepo-affected model. 'none' = not a monorepo."

# --- Repository context (fact from bailiff-mod-base via _external_data) -----

default_branch:
  type: str
  default: "{{ _external_data.base.default_branch }}"
  help: "Default branch name (read from base via _external_data; used in merge-queue trigger)."

# --- GitHub-specific -----------------------------------------------------------

merge_queue_org_confirmed:
  type: bool
  default: false
  help: "Agent sets true only with a confirmed GitHub org / GHEC signal. Required for merge-queue model."

# --- Ordering edges (when:false hidden answers — FR-004) --------------------

depends_on:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

phase:
  type: str
  default: normal
  when: false
