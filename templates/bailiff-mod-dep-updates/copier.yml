# copier.yml — bailiff-mod-dep-updates
#
# Automated dependency hygiene (spec 012 / FR-008). ONE module with the
# `dep_update_tool [renovate, dependabot]` axis (FR-001: isomorphic family —
# same question shape, same output contract; only the rendered syntax differs).
#
# Default is renovate (agent/user overridable — FR-023/R12: github_host is
# deleted from base, so dep_update_tool self-defaults without a host fact).
#
# Exactly one branch's file is written per init; the module NEVER deletes the
# other tool's file (renders only its own branch — switching tools on a live
# project is a manual cleanup, see README). Pure MANAGED renders — ZERO _tasks.
#
# Contract: ships template/{{ _copier_conf.answers_file }}.jinja; NO secret:
# questions; no jinja2_time; edges are when:false hidden answers.

# --- The axis (FR-004 / FR-008) ------------------------------------------------

dep_update_tool:
  type: str
  choices:
    - renovate
    - dependabot
  default: renovate
  help: "Dependency-update tool (renovate or dependabot). Overridable by the agent or user."

# --- Frozen language facts (sizing) --------------------------------------------
# One entry per active ecosystem, in the CHOSEN tool's vocabulary.
dep_ecosystems:
  type: yaml
  default: []
  help: "Frozen list of active ecosystem ids in the chosen tool's vocabulary; bailiff injects this."

# Module phase: normal (FR-020/R8). base=pre; family=normal.
_bailiff_phase: normal

# --- Dependency edges (FR-019 / R7 — single depends_on, no run_after/run_before) ---

depends_on:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

# Template body lives under template/ — copier renders only that subtree.
# Both outputs are MANAGED (byte-identical on reproduce); path segments render
# empty on the unchosen branch, so copier skips that file entirely.
_subdirectory: template

# No _tasks: pure render (FR-008).
