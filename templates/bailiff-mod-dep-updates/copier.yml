# copier.yml — bailiff-mod-dep-updates
#
# Automated dependency hygiene (spec 012 / FR-008). ONE module with the
# `dep_update_tool [renovate, dependabot]` axis (FR-001: isomorphic family —
# same question shape, same output contract; only the rendered syntax differs).
#
# Default follows the repo host (FR-004): dependabot when GitHub-hosted
# (`github_host=true`), renovate otherwise — explicitly overridable.
#
# Exactly one branch's file is written per init; the module NEVER deletes the
# other tool's file (renders only its own branch — switching tools on a live
# project is a manual cleanup, see README). Pure MANAGED renders — ZERO _tasks.
#
# dependabot + github_host=false is WARN-AND-RENDER: the file still renders,
# with a warning comment that dependabot only runs on GitHub-hosted repos.
#
# Contract: ships template/{{ _copier_conf.answers_file }}.jinja; NO secret:
# questions; no jinja2_time; edges are when:false hidden answers.

# --- Threaded host fact (FR-010 pattern) --------------------------------------

github_host:
  type: bool
  default: "{{ github_host }}"
  help: "Whether the project is GitHub-hosted (threaded from bailiff-mod-base); drives the axis default."

# --- The axis (FR-004 / FR-008) ------------------------------------------------

dep_update_tool:
  type: str
  choices:
    - renovate
    - dependabot
  default: "{{ 'dependabot' if github_host else 'renovate' }}"
  help: "Dependency-update tool. Default follows the repo host: dependabot on GitHub, renovate otherwise."

# --- Frozen language facts (sizing) --------------------------------------------
# One entry per active ecosystem, in the CHOSEN tool's vocabulary (the phase-1
# agent maps active package managers to the tool's ecosystem/manager ids, e.g.
# dependabot: [uv, npm, cargo, gomod, github-actions]; renovate managers
# likewise). Empty = minimal valid config, no entries invented.
dep_ecosystems:
  type: yaml
  default: []
  help: "Frozen list of active ecosystem ids in the chosen tool's vocabulary; bailiff injects this."

# --- Dependency edges (when:false hidden answers — FR-004) -------------------

run_after:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

depends_on:
  type: yaml
  default: []
  when: false

run_before:
  type: yaml
  default: []
  when: false

# Template body lives under template/ — copier renders only that subtree.
# Both outputs are MANAGED (byte-identical on reproduce); path segments render
# empty on the unchosen branch, so copier skips that file entirely.
_subdirectory: template

# No _tasks: pure render (FR-008).
