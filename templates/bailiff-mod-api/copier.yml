# copier.yml — bailiff-mod-api
#
# API-first project skeleton (spec 012 / FR-013). Pure render — ZERO _tasks,
# no codegen, no server scaffold (language modules own runtime code).
#
# Lifecycles:
#   SEED-ONCE (_skip_if_exists): openapi.yaml at the REPO ROOT (ledger FR-013:
#     lowest-friction default — spectral/editors find it without config; the
#     project can move it and re-runs never clobber). OpenAPI 3.1 skeleton.
#   MANAGED: .spectral.yaml, .mise/conf.d/bailiff-mod-api.toml (byte-identical
#     on reproduce).
#
# Fragment contributions (spec 014 universal fragment/merge model):
#   spectral tool  → .mise/conf.d/bailiff-mod-api.toml  (mise native drop-in)
#   spectral-lint  → .pre-commit.d/bailiff-mod-api.yaml  (merged by precommit)
#
# Contract: ships template/{{ _copier_conf.answers_file }}.jinja; NO secret:
# questions; edges are when:false hidden answers.

# --- External data (spec 014 _external_data aliases) --------------------------
# Facts are read from producer answers files — never threaded via blanket bleed.

_external_data:
  base: .copier-answers.bailiff-mod-base.yml
  precommit: .copier-answers.bailiff-mod-precommit.yml

# --- Facts read from base (project_name, description) -------------------------

project_name:
  type: str
  default: "{{ _external_data.base.project_name }}"
  help: "The project's name (from bailiff-mod-base; OpenAPI info.title)."

description:
  type: str
  default: "{{ _external_data.base.description }}"
  help: "One-line description (from bailiff-mod-base; OpenAPI info.description)."

# --- Fact read from precommit (hook_manager) ----------------------------------

hook_manager:
  type: str
  default: "{{ _external_data.precommit.hook_manager }}"
  help: "Hook manager (from bailiff-mod-precommit). none = hook fragment inert."

# --- Dependency edges (when:false hidden answers — FR-004) -------------------

depends_on:
  type: yaml
  default:
    - bailiff-mod-base
    - bailiff-mod-precommit
  when: false

phase:
  type: str
  default: normal
  when: false

# Template body lives under template/ — copier renders only that subtree.
_subdirectory: template

# openapi.yaml is SEED-ONCE: scaffolded once, then project-owned.
_skip_if_exists:
  - openapi.yaml

# No _tasks: pure render (FR-013).
