# copier.yml — bailiff-mod-go
#
# The Go language overlay: add Go tooling (go mod, golangci-lint) as a copier
# layer (spec 014). Reads project_name from base via _external_data alias;
# reads hook_manager from precommit via _external_data alias. Contributes:
#   - .mise/conf.d/bailiff-mod-go.toml (own tools, mise merges natively)
#   - .pre-commit.d/bailiff-mod-go.yaml (golangci hook block, precommit bundler merges)
#   - .gitignore.d/bailiff-mod-go (Go gitignore lines, base concat _post_task merges)
#
# Contract (Constitution VI): ships template/{{ _copier_conf.answers_file }}.jinja;
# NO secret: questions; ordering edge is depends_on (when:false hidden answer).

# --- Cross-module facts (spec 014 FR-004/_facts.md) --------------------------
# base is a hard dependency: absent → loud OrderingError at preflight (FR-006).
_external_data:
  base: .copier-answers.bailiff-mod-base.yml
  precommit: .copier-answers.bailiff-mod-precommit.yml

project_name:
  type: str
  default: "{{ _external_data.base.project_name }}"
  help: "The project's name (read from bailiff-mod-base via _external_data)."

# hook_manager read from precommit answers; default empty so a standalone run
# renders gracefully when precommit is absent.
hook_manager:
  type: str
  default: "{{ _external_data.precommit.hook_manager | default('') }}"
  help: "Hook manager (read from bailiff-mod-precommit via _external_data; pre-commit/lefthook/none)."

# --- Go toolchain axes -------------------------------------------------------

# Finite modern list — dead/EOL versions are not offered (Constitution).
go_version:
  type: str
  default: "1.23"
  choices:
    - "1.23"
    - "1.22"
    - "1.21"
  help: "Go toolchain version (pinned in .mise/conf.d/bailiff-mod-go.toml + go.mod)."

# library drops cmd/ entirely (no empty dir); cli/service get cmd/<name>/main.go stub.
app_kind:
  type: str
  default: cli
  choices:
    - cli
    - service
    - library
  help: "Application layout: cli/service includes cmd/<name>/main.go stub; library omits cmd/."

# test_runner is PRIVATE (collision-class: go {go-test,gotestsum} vs rust vs ts).
# Private-by-default — NOT a fact, no _external_data alias (FR-007/_facts.md).
test_runner:
  type: str
  default: go-test
  choices:
    - go-test
    - gotestsum
  help: "Test runner: go-test (stdlib) or gotestsum (richer output)."

# Conditional: when true, adds 'vendor/' line to Go gitignore fragment.
use_vendor_mode:
  type: bool
  default: false
  help: "When true, adds 'vendor/' to the Go .gitignore.d/bailiff-mod-go fragment."

# Rev pinned in the golangci-lint pre-commit hook fragment.
# Agent or --data resolves the concrete tag.
golangci_hook_rev:
  type: str
  default: ""
  help: "Rev (tag) for golangci/golangci-lint in .pre-commit.d/bailiff-mod-go.yaml."

# `today` injected by bailiff at init and frozen into recorded answers (FR-007).
today:
  type: str
  default: ""
  help: "The generation date (YYYY-MM-DD); bailiff injects this — leave blank."

# --- Dependency edge (spec 014 FR-019/R7: depends_on is the only ordering edge) ---
depends_on:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

# Phase: normal (depends on base which is pre); normal may depend on pre (FR-020/R8).
_bailiff_phase: normal

# Template body lives under template/ so copier renders only that subtree.
_subdirectory: template

# Exclude cmd/ entirely when app_kind=library (no empty dir — contract requirement).
_exclude:
  - "{%- if app_kind == 'library' -%}cmd{%- endif -%}"

# --- Seed-once files (FR-005a) -----------------------------------------------
# go.mod is the native tool's manifest: seeded via `go mod init`, then the
# project adds/bumps deps. Re-rendering would revert real work.
# .golangci.yml is seed-once: users tune it after init; clobbering loses that.
# cmd/<name>/main.go is the stub entry point: seed-once for cli/service.
_skip_if_exists:
  - go.mod
  - go.sum
  - .golangci.yml
  - "cmd/{{ project_name | default('app', true) | lower | replace(' ', '-') | replace('_', '-') }}/main.go"

# --- Trust-gated tasks (FR-007b) ---------------------------------------------
# go preflight + init-only-guarded `go mod init` (FR-012a sentinel: go.mod).
# Native `go mod init` runs only on a fresh tree; seed-once ensures a populated
# tree reproduce is a no-op (the committed go.mod is used verbatim — R5).
_tasks:
  - >-
    command -v go >/dev/null 2>&1 ||
    { echo "bailiff-mod-go: required tool 'go' not found on PATH." >&2;
    echo "  go — https://go.dev/doc/install (or use mise: mise install go)" >&2;
    exit 1; }
  - >-
    test -f go.mod ||
    go mod init "{{ project_name | default('app', true) | lower | replace(' ', '-') | replace('_', '-') }}"
