# copier.yml — bailiff-mod-editorconfig
#
# Editor whitespace defaults micro-module (spec 012 / FR-006; spec 015 agentic
# rewrite). Deliberately NOT part of base (keeps base thin — ratified).
#
# spec 015 (FR-016): `.editorconfig` is AGENT-PROJECTED, not a managed render.
# The phase-1 agent writes the whole file at init from the ACTUAL module
# selection (universal defaults + a section per selected language, indentation
# from each linter's convention), and the ENGINE freezes it; `bailiff reproduce`
# replays it with no agent (Constitution III). This drops the 014 model's
# `ts_linter`/`python_linter`/`ruff_line_length` --data questions AND the managed
# `.editorconfig.jinja` render (a managed render would clobber the agent output on
# reproduce — the reproduce-safety lint forbids that overlap).
#
# Under the no-op agent (plain CLI, no phase-1 agent wired), no `.editorconfig`
# is written — the same inert outcome as any agent-projected capability with no
# agent. A real phase-1 agent (the skill/host) produces the file.
#
# Contract: ships template/{{ _copier_conf.answers_file }}.jinja; NO secret:
# questions; no jinja2_time; ordering edge is depends_on (when:false).

# --- Dependency edge (spec 014 FR-019/R7: depends_on is the only ordering edge) ---
# No cross-module _external_data reads → no hard producer dep.
depends_on:
  type: yaml
  default: []
  when: false

# Phase: normal (spec 014 FR-020/R8).
_bailiff_phase: normal

# Template body lives under template/ — copier renders only that subtree.
_subdirectory: template

# --- Agent-projected: write .editorconfig from the selection (spec 015 FR-016) --
# Post-loop `post` so the whole stack (every selected language module) is visible.
# The engine freezes the written .editorconfig; reproduce replays it agent-free.
_post_agent_tasks:
  post: >-
    Write a complete .editorconfig at the project root. Always include a `root = true`
    line and a universal `[*]` section (charset=utf-8, end_of_line=lf,
    insert_final_newline=true, trim_trailing_whitespace=true). Then, for EACH language
    module present in the selection, append a section whose indentation follows that
    language's linter convention — e.g. Python (bailiff-mod-python) → `[*.py]`
    indent_style=space, indent_size=4, max_line_length from the frozen ruff setting;
    TypeScript/JavaScript (bailiff-mod-ts) → `[*.{js,jsx,ts,tsx,mjs,cjs}]`
    indent_style=space, indent_size=2. Invent NO section for a language whose module
    is not selected. Output the complete .editorconfig content.
