# copier.yml — bailiff-mod-editorconfig
#
# Editor whitespace defaults micro-module (spec 012 / FR-006). Deliberately NOT
# part of base (keeps base thin — ratified). Pure MANAGED render — ZERO _tasks.
#
# `.editorconfig` sections are sized from FROZEN language facts the phase-1
# agent injects via --data (FR-006): `ts_linter`, the Python linter identity
# (`python_linter`), and `ruff_line_length`. INVARIANT: indentation derives
# from the linter's convention ONLY, never from line-width facts.
#
# When no language facts are frozen (standalone init), only the universal
# defaults section renders — no language sections are invented.
#
# Contract: ships template/{{ _copier_conf.answers_file }}.jinja; NO secret:
# questions; no jinja2_time; edges are when:false hidden answers.

# ts_linter — threaded fact (FR-002 axis key). Empty when no TS module is
# selected → no TS/JS section. biome and eslint-prettier both follow the
# 2-space indent convention.
ts_linter:
  type: str
  default: "{{ ts_linter }}"
  help: "TS linter identity (threaded/frozen fact; empty = no TS section). biome or eslint-prettier."

# python_linter — frozen Python linter identity (agent injects 'ruff' when a
# Python module is selected). Empty = no Python section.
python_linter:
  type: str
  default: ""
  help: "Python linter identity (frozen fact; e.g. ruff; empty = no Python section). bailiff injects this."

# ruff_line_length — frozen linter line-length setting (FR-002 axis key).
# Feeds max_line_length in the Python section ONLY — never indentation.
ruff_line_length:
  type: str
  default: "88"
  help: "Python max line length from the frozen ruff setting (used when python_linter is set)."

# --- Dependency edges (when:false hidden answers — FR-004) -------------------
run_after:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

depends_on:
  type: yaml
  default: []
  when: false

run_before:
  type: yaml
  default: []
  when: false

# Template body lives under template/ — copier renders only that subtree.
_subdirectory: template

# .editorconfig is MANAGED: byte-identical on reproduce. No _tasks (FR-006).
