# Release-please for the bailiff engine (PyPI package).
# Creates/maintains a "Release PR" that accumulates a changelog from conventional
# commits. On merge of that PR, it tags vX.Y.Z which triggers the pypi-publish
# job in release.yml.
#
# Modules are versioned separately by cog (release.yml fan-out pipeline).
# This workflow only manages the engine version in pyproject.toml.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@v5
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        with:
          python-version: "3.11"

      # Keep uv.lock in lockstep with the version release-please bumps in
      # pyproject.toml. release-please cannot target the bailiff entry inside
      # uv.lock's [[package]] array (no filter-by-name jsonpath; positional index
      # is brittle), so we regenerate the lock on the open PR branch instead.
      # Without this the committed uv.lock lags, and the release job's `uv sync`
      # would re-resolve it and dirty the tree before `cog bump` (now also guarded
      # by `uv sync --frozen`, but the committed lockfile should still be correct).
      - name: Sync uv.lock on the release PR
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_BRANCH: ${{ fromJSON(steps.release-please.outputs.pr).headBranchName }}
        run: |
          set -euo pipefail
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"
          uv lock
          if ! git diff --quiet uv.lock; then
            git config user.name "bailiff-release[bot]"
            git config user.email "bailiff-release[bot]@users.noreply.github.com"
            git commit -qm "chore: sync uv.lock to release version" uv.lock
            git push origin "HEAD:$PR_BRANCH"
          fi
