name: bailiff
version: 0.4.1
description: >-
  An agentic conductor for copier. The bailiff fills in the paperwork
  (per-module answer files); copier makes the copies. Reproduce is agent-free.
  This apm.yml declares the project-scoped agentic layer used to BUILD bailiff
  (spec-driven workflow, structure/toolchain steering, dependency + secret
  scanning). The global layer provides the always-on packages (coder,
  challenger, verify, sniff, debate, handover, etc.).
author: Sjors Robroek
license: Apache-2.0
target: claude,codex
includes: auto
marketplace:
  owner:
    name: bailiff-io
    url: https://github.com/bailiff-io
  build:
    tagPattern: v{version}
  outputs:
    claude: {}
    codex: {}
  packages:
    - name: bailiff
      description: >-
        Agentic conductor for copier — a skill + bundled deterministic scripts.
        Inspects templates, authors run-specs, drives init and faithful
        reproduce.
      source: ./packages/bailiff
      version: 0.4.1
      category: Productivity
      license: Apache-2.0
dependencies:
  apm:
    - srobroek/agentic-packages/packages/speckit#>=5.0.0 <6.0.0
    - >-
      srobroek/agentic-packages/packages/steering-project-structure#>=1.0.0
      <2.0.0
    - >-
      srobroek/agentic-packages/packages/steering-toolchain-defaults#>=2.0.0
      <3.0.0
    - srobroek/agentic-packages/packages/dep-audit#>=1.0.0 <2.0.0
    - srobroek/agentic-packages/packages/secrets-scan#>=1.0.0 <2.0.0
