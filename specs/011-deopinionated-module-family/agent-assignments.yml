    source: "project"
    description: "Implements non-code or tightly scoped tasks from a SpecKit tasks.md, or scopes substantial code work for a parent-delegated coder"
  - name: "speckit-research"
    source: "project"
    description: "Researches current primary-source library or API documentation for a SpecKit decision"
  - name: "speckit-sync"
    source: "project"
    description: "Detects drift between active SpecKit artifacts and implementation, or contradictions between specs"
  - name: "speckit-verify"
    source: "project"
    description: "Validates implemented code against a target SpecKit spec's FR/SC requirements; detects phantom completions"
  - name: "coder"
    source: "user"
    description: "Implementation subagent for bounded code changes. Edits caller's tree directly; does not commit"
  - name: "parallel-coder"
    source: "user"
    description: "Isolated implementation subagent. Self-commits to its own worktree branch for review and merge"
  - name: "pr-reviewer"
    source: "user"
    description: "Reviews pull requests for code quality, security, correctness, and test coverage. Read-only"

